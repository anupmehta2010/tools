name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check . --output-format=github
      - name: Ruff format check
        run: ruff format --check . || true

  smoke:
    name: Smoke test (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install minimal deps
        run: python -m pip install --upgrade pip
      - name: Import every module
        shell: bash
        run: |
          set -e
          for mod in _common pdf_tools image_tools media_tools text_tools data_tools archive_tools crypto_tools net_tools fs_tools dev_tools qr_tools oled_tools convert_tools server tk; do
            echo "::group::import $mod"
            python -c "import $mod" || (echo "FAIL: $mod" && exit 1)
            echo "::endgroup::"
          done
      - name: tk --help
        run: python tk.py --help
      - name: tk list
        run: python tk.py list
      - name: Smoke — text hash
        run: |
          python -c "print('hello world')" > tmp.txt
          python tk.py text hash --algo sha256 -i tmp.txt
      - name: Smoke — dev calc
        run: python tk.py dev calc "2 + 2 * 5"
      - name: Smoke — crypto password
        run: python tk.py crypto password --length 16 --count 2

  build-binary:
    name: Build standalone binary
    runs-on: ${{ matrix.os }}
    needs: [lint, smoke]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyinstaller
      - name: Build
        run: pyinstaller --onefile --name tk tk.py
      - uses: actions/upload-artifact@v4
        with:
          name: tk-${{ matrix.os }}
          path: dist/tk*
