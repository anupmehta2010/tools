name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check . --output-format=github
      - name: Ruff format check
        run: ruff format --check . || true

  core:
    name: Core tests (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov hypothesis
      - name: Run core lane (stdlib-only) with coverage gate
        run: python -m pytest tests/ --ignore=tests/e2e --cov --cov-report=term-missing --cov-fail-under=25 -q

  full:
    name: Full tests (optional deps, best-effort)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg pandoc tesseract-ocr
      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest hypothesis
          pip install -r requirements.txt || true
      - name: Run full lane (best-effort)
        continue-on-error: true
        run: python -m pytest tests/ --ignore=tests/e2e -q

  e2e:
    name: E2E tests (playwright, best-effort)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install playwright deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-playwright
          python -m playwright install --with-deps chromium
      - name: Run e2e lane (best-effort)
        continue-on-error: true
        run: |
          if [ -d tests/e2e ]; then
            python -m pytest tests/e2e -q
          else
            echo "tests/e2e does not exist yet — skipping"
          fi

  build-binary:
    name: Build standalone binary
    runs-on: ${{ matrix.os }}
    needs: [lint, core]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyinstaller
      - name: Build
        run: pyinstaller --onefile --name tk tk.py
      - uses: actions/upload-artifact@v4
        with:
          name: tk-${{ matrix.os }}
          path: dist/tk*
